<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Milk Tracker"/>
<meta name="theme-color" content="#0369a1"/>
<title>🥛 Milk Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, 'Segoe UI', sans-serif;
    background: #f0f9ff;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #0369a1, #0284c7);
    color: white;
    padding: 20px 16px 16px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(3,105,161,0.3);
  }
  .header h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
  .header p { font-size: 12px; opacity: 0.8; margin-top: 2px; }

  /* Controls */
  .controls {
    background: white;
    margin: 12px;
    border-radius: 16px;
    padding: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .ctrl-group { flex: 1 1 100px; }
  .ctrl-group label {
    display: block;
    font-size: 10px;
    font-weight: 700;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 5px;
  }
  .ctrl-group select,
  .ctrl-group input[type="number"] {
    width: 100%;
    padding: 9px 10px;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    font-size: 14px;
    color: #0f172a;
    background: #f8fafc;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
  }
  .ctrl-group select:focus,
  .ctrl-group input:focus {
    border-color: #0369a1;
    background: white;
  }

  /* Summary */
  .summary {
    display: flex;
    gap: 8px;
    margin: 0 12px 12px;
  }
  .card {
    flex: 1;
    background: white;
    border-radius: 14px;
    padding: 12px 8px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .card-icon { font-size: 22px; line-height: 1; }
  .card-val { font-size: 17px; font-weight: 800; margin-top: 3px; line-height: 1.1; }
  .card-label { font-size: 10px; color: #94a3b8; margin-top: 2px; }
  .card.blue .card-val { color: #0369a1; }
  .card.green .card-val { color: #15803d; }
  .card.purple .card-val { color: #7c3aed; }

  /* Table */
  .table-wrap {
    background: white;
    margin: 0 12px;
    border-radius: 16px;
    padding: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    overflow: hidden;
  }
  
  /* New Table Header styles */
  .table-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .table-title {
    font-size: 13px;
    font-weight: 700;
    color: #0369a1;
  }
  .clear-btn {
    background: #fee2e2;
    color: #b91c1c;
    border: 1px solid #f87171;
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
  }
  .clear-btn:active { background: #fca5a5; }

  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  thead tr { background: #f0f9ff; }
  th {
    padding: 8px 4px;
    font-size: 10px;
    font-weight: 700;
    color: #0369a1;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    text-align: center;
  }
  td { 
    padding: 6px 4px; 
    vertical-align: middle; 
    border-bottom: 1px solid #f1f5f9; 
    text-align: center;
  }
  
  .col-divider { border-right: 2px solid #e2e8f0; }
  .today-cell { background: #fef9c3; }
  .daynum { font-size: 13px; font-weight: 700; color: #0f172a; }
  
  .qty-input {
    width: 100%;
    max-width: 60px;
    padding: 6px 4px;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    font-size: 14px;
    color: #0c4a6e;
    background: white;
    outline: none;
    text-align: center;
    -webkit-appearance: none;
    appearance: none;
  }
  .qty-input:focus { border-color: #0369a1; background: #f0f9ff; }
  .qty-input.filled { border-color: #0ea5e9; background: #f0f9ff; font-weight: 700; }
  
  tfoot tr { background: #f0fdf4; border-top: 2px solid #bbf7d0; }
  tfoot td { font-weight: 800; padding: 12px 6px; }
  .total-label { font-size: 12px; color: #15803d; text-align: left; }
  .total-litres { font-size: 14px; color: #0369a1; }
  .total-cost { font-size: 14px; color: #15803d; text-align: right; }

  /* Save toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #0f172a;
    color: white;
    padding: 10px 20px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 600;
    transition: transform 0.3s ease;
    z-index: 200;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .hint { text-align: center; color: #94a3b8; font-size: 11px; margin-top: 12px; padding: 0 12px; }
</style>
</head>
<body>

<div class="header">
  <h1>🥛 Milk Tracker</h1>
  <p>Daily milk log &amp; monthly cost calculator</p>
</div>

<div class="controls">
  <div class="ctrl-group">
    <label>Month</label>
    <select id="monthSel"></select>
  </div>
  <div class="ctrl-group">
    <label>Year</label>
    <select id="yearSel"></select>
  </div>
  <div class="ctrl-group">
    <label>Price / Litre (₹)</label>
    <input type="number" id="priceInput" value="60" min="1" step="0.5"/>
  </div>
</div>

<div class="summary">
  <div class="card blue">
    <div class="card-icon">🧮</div>
    <div class="card-val" id="totalLitres">0.00 L</div>
    <div class="card-label">Total Litres</div>
  </div>
  <div class="card green">
    <div class="card-icon">💰</div>
    <div class="card-val" id="totalCost">₹0.00</div>
    <div class="card-label">Total Cost</div>
  </div>
  <div class="card purple">
    <div class="card-icon">📊</div>
    <div class="card-val" id="avgDay">— L</div>
    <div class="card-label">Avg / Day</div>
  </div>
</div>

<div class="table-wrap">
  <div class="table-header">
    <div class="table-title" id="tableTitle">—</div>
    <button class="clear-btn" id="clearBtn">Clear Month</button>
  </div>
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th class="col-divider">Litres</th>
        <th>Date</th>
        <th>Litres</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
    <tfoot>
      <tr>
        <td colspan="2" class="total-label" id="totalLabel">TOTAL</td>
        <td class="total-litres" id="footLitres">0.00 L</td>
        <td class="total-cost" id="footCost">₹0.00</td>
      </tr>
    </tfoot>
  </table>
</div>

<p class="hint">Enter litres in decimals — 0.5 for half litre · Data saves automatically 💾</p>

<div class="toast" id="toast">✅ Saved!</div>

<script>
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

const today = new Date();
let curMonth = today.getMonth();
let curYear = today.getFullYear();
let price = 60;

// Populate month/year selects
const monthSel = document.getElementById('monthSel');
const yearSel = document.getElementById('yearSel');
MONTHS.forEach((m, i) => {
  const o = document.createElement('option');
  o.value = i; o.textContent = m;
  if (i === curMonth) o.selected = true;
  monthSel.appendChild(o);
});
for (let y = today.getFullYear() - 2; y <= today.getFullYear() + 1; y++) {
  const o = document.createElement('option');
  o.value = y; o.textContent = y;
  if (y === curYear) o.selected = true;
  yearSel.appendChild(o);
}

// LocalStorage helpers
function storageKey(y, m) { return `milk_${y}_${m}`; }
function loadData(y, m) {
  try { return JSON.parse(localStorage.getItem(storageKey(y, m))) || {}; }
  catch(e) { return {}; }
}
function saveData(y, m, data) {
  localStorage.setItem(storageKey(y, m), JSON.stringify(data));
  showToast('✅ Saved!');
}

function getDaysInMonth(m, y) { return new Date(y, m + 1, 0).getDate(); }

let saveTimer = null;
function showToast(msg = '✅ Saved!') {
  const t = document.getElementById('toast');
  t.textContent = msg; // Update dynamic message
  t.classList.add('show');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => t.classList.remove('show'), 1500);
}

function renderTable() {
  const days = getDaysInMonth(curMonth, curYear);
  const data = loadData(curYear, curMonth);
  price = parseFloat(document.getElementById('priceInput').value) || 0;

  document.getElementById('tableTitle').textContent = `${MONTHS[curMonth]} ${curYear}`;

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  let totalL = 0, filledDays = 0;

  // Loop exactly 16 times for the left column (1-16)
  for (let i = 1; i <= 16; i++) {
    const tr = document.createElement('tr');
    
    // Calculate dates for left and right columns
    const leftDate = i;
    const rightDate = i + 16;

    // Build Left Side (1-16)
    let leftHtml = '';
    if (leftDate <= days) {
      const leftQty = data[leftDate];
      const leftHasQty = leftQty !== undefined && leftQty !== '' && !isNaN(leftQty);
      if (leftHasQty) { totalL += parseFloat(leftQty); filledDays++; }
      
      const isTodayLeft = leftDate === today.getDate() && curMonth === today.getMonth() && curYear === today.getFullYear();
      
      leftHtml = `
        <td class="daynum ${isTodayLeft ? 'today-cell' : ''}">${leftDate}</td>
        <td class="col-divider ${isTodayLeft ? 'today-cell' : ''}">
          <input type="number" class="qty-input${leftHasQty ? ' filled' : ''}" min="0" step="0.25"
            placeholder="—" value="${leftHasQty ? leftQty : ''}" data-day="${leftDate}"/>
        </td>
      `;
    } else {
      leftHtml = `<td class="daynum"></td><td class="col-divider"></td>`;
    }

    // Build Right Side (17-31)
    let rightHtml = '';
    if (rightDate <= days) {
      const rightQty = data[rightDate];
      const rightHasQty = rightQty !== undefined && rightQty !== '' && !isNaN(rightQty);
      if (rightHasQty) { totalL += parseFloat(rightQty); filledDays++; }
      
      const isTodayRight = rightDate === today.getDate() && curMonth === today.getMonth() && curYear === today.getFullYear();

      rightHtml = `
        <td class="daynum ${isTodayRight ? 'today-cell' : ''}">${rightDate}</td>
        <td class="${isTodayRight ? 'today-cell' : ''}">
          <input type="number" class="qty-input${rightHasQty ? ' filled' : ''}" min="0" step="0.25"
            placeholder="—" value="${rightHasQty ? rightQty : ''}" data-day="${rightDate}"/>
        </td>
      `;
    } else {
      rightHtml = `<td class="daynum"></td><td></td>`;
    }

    tr.innerHTML = leftHtml + rightHtml;
    tbody.appendChild(tr);
  }

  // Bind inputs
  tbody.querySelectorAll('.qty-input').forEach(inp => {
    inp.addEventListener('input', function() {
      const day = parseInt(this.dataset.day);
      const val = this.value;
      const data = loadData(curYear, curMonth);
      if (val === '' || isNaN(parseFloat(val))) {
        delete data[day];
        this.classList.remove('filled');
      } else {
        data[day] = parseFloat(val);
        this.classList.add('filled');
      }
      saveData(curYear, curMonth, data);
      updateSummary();
    });
  });

  updateSummaryWith(totalL, filledDays);
}

function updateSummary() {
  const data = loadData(curYear, curMonth);
  const days = getDaysInMonth(curMonth, curYear);
  let totalL = 0, filled = 0;
  for (let d = 1; d <= days; d++) {
    const v = data[d];
    if (v !== undefined && v !== '' && !isNaN(v)) { totalL += parseFloat(v); filled++; }
  }
  updateSummaryWith(totalL, filled);
}

function updateSummaryWith(totalL, filledDays) {
  price = parseFloat(document.getElementById('priceInput').value) || 0;
  const totalCost = totalL * price;
  const avg = filledDays > 0 ? (totalL / filledDays).toFixed(2) : '—';
  
  document.getElementById('totalLitres').textContent = totalL.toFixed(2) + ' L';
  document.getElementById('totalCost').textContent = '₹' + totalCost.toFixed(2);
  document.getElementById('avgDay').textContent = avg === '—' ? '— L' : avg + ' L';
  
  document.getElementById('footLitres').textContent = totalL.toFixed(2) + ' L';
  document.getElementById('footCost').textContent = '₹' + totalCost.toFixed(2);
  document.getElementById('totalLabel').textContent = `TOTAL`;
}

// Clear Data Event
document.getElementById('clearBtn').addEventListener('click', () => {
  const monthName = MONTHS[curMonth];
  if (confirm(`Are you sure you want to clear all data for ${monthName} ${curYear}?`)) {
    localStorage.removeItem(storageKey(curYear, curMonth));
    renderTable(); // Re-render table completely empty
    showToast('🗑️ Month Cleared!');
  }
});

// Events
monthSel.addEventListener('change', () => { curMonth = parseInt(monthSel.value); renderTable(); });
yearSel.addEventListener('change', () => { curYear = parseInt(yearSel.value); renderTable(); });
document.getElementById('priceInput').addEventListener('input', () => renderTable());

// Init
renderTable();
</script>
</body>
</html>
